<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - NoorByte</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div id="branding">
                <!-- Assuming your main page is index.html and logo is here -->
                <a href="index.html"><img src="assets/logo/logo.png" alt="NoorByte Logo"></a>
            </div>
            <nav>
                <ul>
                    <!-- Assuming these are your nav links -->
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#services">Services</a></li>
                    <li><a href="index.html#portfolio">Portfolio</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="contact-page">
        <div class="container">
            <h1 class="section-title">Contact Me</h1>
            <p>Have a question or want to work together? Fill out the form below.</p>
            <!-- 
                To make this form work, you can use a free service like Formspree.
                1. Go to https://formspree.io/
                2. Create a new form and get your unique URL.
                3. Replace 'https://formspree.io/f/your_form_id' with your URL.
            -->
            <form id="contact-form" action="https://formspree.io/f/your_form_id" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="button">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>NoorByte.in &copy; 2024 | All Rights Reserved</p>
    </footer>

    <!-- Main JavaScript File -->
    <script src="assets/js/main.js"></script>
</body>
</html>
